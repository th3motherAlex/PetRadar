services:
  - type: web
    name: petradar-api
    runtime: docker
    repo: https://github.com/th3motherAlex/PetRadar
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "npm run migration:run:prod && npm run start:prod"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: petradar-db
          property: connectionString
      - key: DB_SSL
        value: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: petradar-redis
          property: connectionString
      - key: REDIS_TLS
        value: false
      - key: APPLICATIONINSIGHTS_CONNECTION_STRING
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false

  - type: keyvalue
    name: petradar-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: petradar-db
    databaseName: petradar
    user: petradar
    plan: free

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pet-radar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run migration:run:prod && npm run start:prod"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: pet_radar
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-your-user}
      SMTP_PASS: ${SMTP_PASS:-your-password}
      MAIL_FROM: ${MAIL_FROM:-PetRadar <no-reply@petradar.local>}
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-alerts@example.com}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-your-mapbox-token}
    ports:
      - '3000:3000'

  postgres:
    image: postgis/postgis:16-3.4
    container_name: pet-radar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pet_radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pet_radar']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pet-radar-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
